</main>
<script>

function splinePoint(a,t){const n=a.length,u=t*n,i=Math.floor(u)%n,f=u-Math.floor(u),p0=a[(i-1+n)%n],p1=a[i],p2=a[(i+1)%n],p3=a[(i+2)%n],f2=f*f,f3=f2*f;return{x:.5*((2*p1.x)+(-p0.x+p2.x)*f+(2*p0.x-5*p1.x+4*p2.x-p3.x)*f2+(-p0.x+3*p1.x-3*p2.x+p3.x)*f3),y:.5*((2*p1.y)+(-p0.y+p2.y)*f+(2*p0.y-5*p1.y+4*p2.y-p3.y)*f2+(-p0.y+3*p1.y-3*p2.y+p3.y)*f3)}}

$('#viewport').onwheel=e=>{e.preventDefault();let rect=e.currentTarget.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top,old=camera.z,nz=Math.max(.2,Math.min(3.2,old*Math.exp(-e.deltaY*.001)));camera.x=mx-(mx-camera.x)*nz/old;camera.y=my-(my-camera.y)*nz/old;camera.z=nz;cameraMode='manual';$('#cameraBtn').textContent='🗺 Whole map';applyCamera(false)};$('#viewport').onpointerdown=e=>{if(e.target.closest('.space'))return;drag={x:e.clientX,y:e.clientY,cx:camera.x,cy:camera.y};$('#viewport').setPointerCapture(e.pointerId);$('#viewport').classList.add('dragging')};$('#viewport').onpointermove=e=>{if(!drag)return;camera.x=drag.cx+e.clientX-drag.x;camera.y=drag.cy+e.clientY-drag.y;cameraMode='manual';applyCamera(false)};$('#viewport').onpointerup=()=>{drag=null;$('#viewport').classList.remove('dragging')};window.onresize=()=>{if(G&&cameraMode==='map')fitBoard()};setupRows();
})();
</script>
